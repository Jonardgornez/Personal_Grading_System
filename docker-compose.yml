version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_student_grading
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_grading
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_student_grading
    restart: always
    depends_on:
      - mysql
    ports:
      - "5050:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root

  app:
    build: .
    container_name: nextjs_student_grading
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "1000:3000"
    environment:
      DATABASE_URL: "mysql://root:root@mysql:3306/student_grading"
      DATABASE_HOST: "mysql"
      DATABASE_PORT: "3306"
      DATABASE_USER: "root"
      DATABASE_PASSWORD: "root"
      DATABASE_NAME: "student_grading"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      NODE_ENV: "production"
      AI_PROVIDER: "${AI_PROVIDER}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"

volumes:
  mysql_data:
